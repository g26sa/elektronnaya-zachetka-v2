services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: "sqlserver://db:1433;database=ezk;user=sa;password=${DB_PASSWORD};trustServerCertificate=true;encrypt=true"
      SEED: ${SEED:-0}
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: "sqlserver://db:1433;database=ezk;user=sa;password=${DB_PASSWORD};trustServerCertificate=true;encrypt=true"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "7d"
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "80:3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  mssql_data:
  uploads:
